<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>InvestTrack — 股票投資報表</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
	<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
	<style>
	/* ═══════════════════════════════════════════════
	   TOKENS — Dark (default)
	═══════════════════════════════════════════════ */
	:root {
		--bg:           #090909;
		--bg-1:         #131313;
		--bg-2:         #1c1c1c;
		--bg-3:         #242424;
		--line:         rgba(255,255,255,0.11);
		--line-strong:  rgba(255,255,255,0.22);
		--txt:          #f0f0f0;
		--txt-2:        #aaa;
		--txt-3:        #6b6b6b;
		--accent:       #e8ff47;       /* signature yellow-green, like anime.js */
		--accent-dim:   rgba(232,255,71,0.08);
		--gain:         #ff5252;
		--gain-bg:      rgba(255,82,82,0.09);
		--loss:         #2ecc71;
		--loss-bg:      rgba(46,204,113,0.09);
		--danger:       #e05252;
		--danger-dim:   rgba(224,82,82,0.10);
		--danger-border:rgba(224,82,82,0.30);
		--ok:           #3fb950;
		--ok-dim:       rgba(63,185,80,0.10);
		--warn:         #d4a017;
		--warn-dim:     rgba(212,160,23,0.10);
		--mono:         'JetBrains Mono', monospace;
		--sans:         'Space Grotesk', 'Inter', sans-serif;
		--ease:         cubic-bezier(0.16,1,0.3,1);
		--t:            0.18s;
	}
	[data-theme="light"] {
		--bg:           #f5f5f3;
		--bg-1:         #ffffff;
		--bg-2:         #f0f0ee;
		--bg-3:         #e8e8e6;
		--line:         rgba(0,0,0,0.07);
		--line-strong:  rgba(0,0,0,0.12);
		--txt:          #111;
		--txt-2:        #555;
		--txt-3:        #8a8a8a;
		--accent:       #1a1a1a;
		--accent-dim:   rgba(0,0,0,0.05);
		--gain:         #dc2626;
		--gain-bg:      rgba(220,38,38,0.08);
		--loss:         #16a34a;
		--loss-bg:      rgba(22,163,74,0.08);
		--danger:       #dc2626;
		--danger-dim:   rgba(220,38,38,0.08);
		--danger-border:rgba(220,38,38,0.28);
		--ok:           #16a34a;
		--ok-dim:       rgba(22,163,74,0.08);
		--warn:         #a16207;
		--warn-dim:     rgba(161,98,7,0.08);
	}

	/* ═══════════════════════════════════════════════
	   RESET
	═══════════════════════════════════════════════ */
	*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
	html { font-size:16px; }
	body {
		font-family: var(--sans);
		background: var(--bg);
		color: var(--txt);
		min-height: 100vh;
		transition: background var(--t), color var(--t);
		line-height: 1.5;
		-webkit-font-smoothing: antialiased;
	}
	input, select, button, textarea { font-family: inherit; }
	input[type="date"]::-webkit-calendar-picker-indicator {
		filter: invert(0.5); cursor: pointer;
	}
	[data-theme="light"] input[type="date"]::-webkit-calendar-picker-indicator { filter:none; }
	::-webkit-scrollbar { width:4px; height:4px; }
	::-webkit-scrollbar-track { background:transparent; }
	::-webkit-scrollbar-thumb { background:var(--line-strong); border-radius:2px; }

	/* ═══════════════════════════════════════════════
	   GRID BACKGROUND
	═══════════════════════════════════════════════ */
	body::before {
		content:'';
		position:fixed; inset:0; pointer-events:none; z-index:0;
		background-image:
			linear-gradient(var(--line) 1px, transparent 1px),
			linear-gradient(90deg, var(--line) 1px, transparent 1px);
		background-size: 40px 40px;
		transition: opacity var(--t);
	}
	[data-theme="light"] body::before { opacity:0.6; }

	/* ═══════════════════════════════════════════════
	   LAYOUT
	═══════════════════════════════════════════════ */
	.wrap { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:0 28px 80px; }

	/* ═══════════════════════════════════════════════
	   HEADER
	═══════════════════════════════════════════════ */
	.header {
		display:flex; align-items:center; gap:20px;
		padding:22px 0 20px;
		border-bottom:1px solid var(--line-strong);
		margin-bottom:40px;
		flex-wrap:wrap;
	}
	.logo {
		display:flex; align-items:baseline; gap:10px;
		text-decoration:none;
	}
	.logo-mark {
		font-family: var(--mono);
		font-size:13px; font-weight:700;
		color: var(--bg);
		background: var(--accent);
		padding:3px 7px;
		letter-spacing:0.5px;
	}
	.logo-name {
		font-family: var(--mono);
		font-size:13px; font-weight:500;
		color:var(--txt-2);
		letter-spacing:1px;
		text-transform:uppercase;
	}
	.header-sep { flex:1; }
	.header-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

	/* ═══════════════════════════════════════════════
	   BUTTONS
	═══════════════════════════════════════════════ */
	.btn {
		display:inline-flex; align-items:center; gap:6px;
		padding:8px 16px;
		font-size:12px; font-weight:600;
		letter-spacing:0.4px; text-transform:uppercase;
		border:1px solid var(--line-strong);
		background:var(--bg-2); color:var(--txt);
		cursor:pointer; transition:all var(--t);
		white-space:nowrap;
	}
	.btn:hover { border-color:var(--txt-2); color:var(--txt); background:var(--bg-3); }
	.btn:active { transform:scale(0.97); }

	.btn-accent {
		background:var(--accent); color:var(--bg); border-color:var(--accent);
	}
	.btn-accent:hover { opacity:0.88; color:var(--bg); background:var(--accent); border-color:var(--accent); }

	.btn-dim {
		background:var(--bg-2); border-color:var(--line-strong);
	}

	.btn-danger { color:var(--danger); background:var(--danger-dim); border-color:var(--danger-border); }
	.btn-danger:hover { background:var(--danger); border-color:var(--danger); color:#fff; }

	.btn-icon { padding:8px; }

	/* Theme toggle */
	.theme-btn {
		width:40px; height:32px;
		border:1px solid var(--line-strong);
		background:var(--bg-2); color:var(--txt-2);
		cursor:pointer; font-size:14px;
		display:flex; align-items:center; justify-content:center;
		transition:all var(--t);
	}
	.theme-btn:hover { border-color:var(--txt-3); color:var(--txt); }

	/* ═══════════════════════════════════════════════
	   WELCOME SCREEN
	═══════════════════════════════════════════════ */
	.welcome {
		padding:100px 0 80px;
		display:flex; flex-direction:column; align-items:center; text-align:center;
	}
	.welcome-tag {
		font-family:var(--mono);
		font-size:11px; font-weight:500; letter-spacing:2px; text-transform:uppercase;
		color:var(--accent); margin-bottom:24px;
	}
	[data-theme="light"] .welcome-tag { color:var(--txt-2); }
	.welcome-h1 {
		font-size:clamp(36px,6vw,64px); font-weight:700; line-height:1.05;
		letter-spacing:-2px; margin-bottom:20px;
		color:var(--txt);
	}
	.welcome-h1 em {
		font-style:normal;
		color:var(--accent);
	}
	[data-theme="light"] .welcome-h1 em { color:var(--txt); text-decoration:underline; text-underline-offset:6px; }
	.welcome-sub {
		font-size:16px; color:var(--txt-2); max-width:460px; line-height:1.7;
		margin-bottom:48px;
	}
	.welcome-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:80px; }

	/* Drop zone */
	.drop-zone {
		width:100%; max-width:480px;
		border:1px dashed var(--line-strong);
		padding:32px; text-align:center;
		cursor:pointer; transition:all var(--t);
		color:var(--txt-3);
	}
	.drop-zone:hover, .drop-zone.over {
		border-color:var(--accent); color:var(--txt-2); background:var(--accent-dim);
	}
	.drop-zone-icon { font-size:28px; margin-bottom:10px; }
	.drop-zone-label { font-size:13px; font-weight:500; }
	.drop-zone-sub { font-size:11px; margin-top:4px; color:var(--txt-3); font-family:var(--mono); }

	/* ═══════════════════════════════════════════════
	   REPORT BAR
	═══════════════════════════════════════════════ */
	.report-bar {
		display:flex; align-items:center; gap:16px;
		border-bottom:1px solid var(--line-strong);
		padding-bottom:20px; margin-bottom:48px;
		flex-wrap:wrap;
	}
	.report-name {
		font-size:22px; font-weight:700; letter-spacing:-0.5px;
		background:transparent; border:none; outline:none;
		color:var(--txt); flex:1; min-width:180px;
	}
	.report-name::placeholder { color:var(--txt-3); font-weight:400; }
	.report-meta {
		font-family:var(--mono); font-size:11px;
		color:var(--txt-3); white-space:nowrap;
	}

	/* ═══════════════════════════════════════════════
	   SUMMARY GRID
	═══════════════════════════════════════════════ */
	.kpi-grid {
		display:grid;
		grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
		border-top:1px solid var(--line-strong);
		border-left:1px solid var(--line-strong);
		margin-bottom:56px;
	}
	.kpi {
		border-right:1px solid var(--line-strong);
		border-bottom:1px solid var(--line-strong);
		padding:22px 20px 18px;
		position:relative; overflow:hidden;
		background:var(--bg-1);
		transition:background var(--t);
		min-width:0;
	}
	.kpi:hover { background:var(--bg-2); }
	.kpi-label {
		font-family:var(--mono);
		font-size:11px; font-weight:600; letter-spacing:1.2px;
		color:var(--txt-2); margin-bottom:12px;
	}
	.kpi-value {
		font-family:var(--mono);
		font-size:clamp(17px,2vw,26px);
		font-weight:700; line-height:1.1;
		color:var(--txt); margin-bottom:8px;
		transition:color 0.4s;
		white-space:nowrap;
		overflow:hidden;
	}
	.kpi-value.gain { color:var(--gain); }
	.kpi-value.loss { color:var(--loss); }
	.kpi-sub { font-size:12px; color:var(--txt-2); }
	/* accent bar at top of hero KPI */
	.kpi.hero::before {
		content:'';
		position:absolute; top:0; left:0; right:0; height:2px;
		background:var(--accent);
	}

	/* ═══════════════════════════════════════════════
	   SECTION HEADER
	═══════════════════════════════════════════════ */
	.section-row {
		display:flex; align-items:center; justify-content:space-between;
		gap:12px; margin-bottom:16px; flex-wrap:wrap;
	}
	.section-label {
		font-family:var(--mono);
		font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
		color:var(--txt-3);
	}

	/* ═══════════════════════════════════════════════
	   ANALYSIS TABLE
	═══════════════════════════════════════════════ */
	.analysis-wrap {
		border:1px solid var(--line-strong);
		background:var(--bg-1);
		margin-bottom:56px; overflow-x:auto;
	}
	.analysis-wrap table { width:100%; border-collapse:collapse; font-size:14px; }
	.analysis-wrap thead th {
		padding:12px 16px;
		text-align:left; font-family:var(--mono);
		font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
		color:var(--txt-2); border-bottom:1px solid var(--line-strong);
		white-space:nowrap; background:var(--bg-1);
	}
	.analysis-wrap tbody tr { border-bottom:1px solid var(--line); background:var(--bg-1); transition:background var(--t); }
	.analysis-wrap tbody tr:last-child { border-bottom:none; }
	.analysis-wrap tbody tr:hover { background:var(--bg-2); }
	.analysis-wrap td { padding:14px 16px; vertical-align:middle; }

	/* Symbol badge */
	.sym {
		font-family:var(--mono); font-size:12px; font-weight:700;
		color:var(--accent); letter-spacing:0.5px;
		background:var(--accent-dim);
		padding:3px 8px;
		border:1px solid rgba(232,255,71,0.15);
	}
	[data-theme="light"] .sym {
		color:var(--txt); background:var(--bg-3); border-color:var(--line-strong);
	}

	/* ROI bar */
	.roi-bar { height:2px; background:var(--line-strong); margin-top:6px; }
	.roi-bar-fill { height:100%; transition:width 0.5s var(--ease); }

	/* ═══════════════════════════════════════════════
	   STOCK CARDS
	═══════════════════════════════════════════════ */
	.cards { display:flex; flex-direction:column; gap:16px; margin-bottom:56px; }

	/* Outer wrapper handles drag highlight without affecting inner border */
	.card-outer {
		border:1px solid var(--line-strong);
		background:var(--bg-1);
		transition:border-color var(--t), box-shadow var(--t);
	}
	.card-outer.drag-over {
		border-color:var(--accent);
		box-shadow:0 -3px 0 0 var(--accent);
	}
	.card-outer.is-dragging { opacity:0.3; }

	.card-head {
		display:flex; align-items:center; gap:12px;
		padding:14px 18px;
		border-bottom:1px solid var(--line);
		background:var(--bg-1);
		flex-wrap:wrap;
		cursor:pointer;
		user-select:none;
	}
	.drag-handle {
		color:var(--txt-3); cursor:grab; padding:2px 4px;
		font-size:14px; user-select:none; flex-shrink:0;
		transition:color var(--t);
		touch-action:none;
	}
	.drag-handle:hover { color:var(--txt-2); }
	.drag-handle:active { cursor:grabbing; }

	.collapse-btn {
		background:none; border:none; cursor:pointer;
		color:var(--txt-3); padding:2px 6px;
		flex-shrink:0; display:flex; align-items:center;
		transition:color var(--t), transform 0.22s ease;
		font-size:11px; line-height:1;
	}
	.collapse-btn:hover { color:var(--txt-2); }
	.collapse-btn.is-collapsed { transform:rotate(-90deg); }
	.card-head.is-collapsed { border-bottom-color:transparent; }

	.card-sym {
		font-family:var(--mono); font-size:13px; font-weight:700;
		color:var(--accent); letter-spacing:1px;
	}
	[data-theme="light"] .card-sym { color:var(--txt); }

	.card-name-input {
		width:180px; flex-shrink:0;
		background:transparent; border:none; outline:none;
		border-bottom:1px solid transparent;
		font-size:14px; font-weight:500; color:var(--txt);
		padding:2px 4px; transition:border-color var(--t);
	}
	.card-name-input:focus { border-bottom-color:var(--line-strong); }
	.card-name-input::placeholder { color:var(--txt-3); font-weight:400; }

	.card-stats { display:flex; gap:24px; margin-left:auto; flex-wrap:wrap; padding-right:12px; border-right:1px solid var(--line-strong); }
	.card-stat { text-align:right; }
	.card-stat-label { font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--txt-2); }
	.card-stat-val { font-family:var(--mono); font-size:13px; font-weight:600; }
	.card-stat-val.gain { color:var(--gain); }
	.card-stat-val.loss { color:var(--loss); }

	/* transactions table inside card */
	.tx-wrap { overflow-x:auto; }
	.tx-table { width:100%; border-collapse:collapse; font-size:14px; }
	.tx-table thead th {
		padding:10px 14px;
		font-family:var(--mono); font-size:11px; font-weight:600;
		letter-spacing:1px; text-transform:uppercase; color:var(--txt-2);
		border-bottom:1px solid var(--line); white-space:nowrap;
		text-align:left;
	}
	.tx-table tbody tr { border-bottom:1px solid var(--line); background:var(--bg-1); transition:background var(--t); }
	.tx-table tbody tr:last-child { border-bottom:none; }
	.tx-table tbody tr:hover { background:var(--bg-2); }
	.tx-table td { padding:9px 14px; vertical-align:middle; }

	.type-tag {
		font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.5px;
		padding:3px 9px; text-transform:uppercase;
	}
	.type-buy { color:var(--gain); background:var(--gain-bg); }
	.type-sell { color:var(--loss); background:var(--loss-bg); }

	/* Editable cell */
	.td-in {
		background:transparent; border:1px solid transparent;
		color:var(--txt); padding:6px 8px; font-size:14px;
		width:100%; transition:border-color var(--t), background var(--t);
		font-family:inherit;
	}
	.td-in:focus { outline:none; border-color:var(--line-strong); background:var(--bg-2); }
	.td-in.mono { font-family:var(--mono); }
	.td-sel {
		background:var(--bg-2); border:1px solid var(--line-strong);
		color:var(--txt); padding:6px 8px; font-size:13px; cursor:pointer;
		transition:border-color var(--t);
	}
	.td-sel:focus { outline:none; border-color:var(--txt-3); }

	.td-total { font-family:var(--mono); font-weight:700; font-size:14px; white-space:nowrap; }
	.td-total.buy { color:var(--loss); }
	.td-total.sell { color:var(--gain); }

	/* Add row button */
	.add-row-btn {
		display:flex; align-items:center; gap:8px;
		width:100%; padding:12px 18px;
		font-family:var(--mono); font-size:11px; font-weight:600;
		letter-spacing:1px; text-transform:uppercase;
		color:var(--txt-3); background:none;
		border:none; border-top:1px solid var(--line);
		cursor:pointer; transition:all var(--t);
	}
	.add-row-btn:hover { color:var(--txt); background:var(--bg-2); }

	/* Empty row */
	.tx-empty {
		padding:24px 18px;
		font-family:var(--mono); font-size:11px;
		color:var(--txt-3); letter-spacing:0.5px;
		background:var(--bg-1);
	}

	/* ═══════════════════════════════════════════════
	   ADD STOCK PANEL
	═══════════════════════════════════════════════ */
	.add-stock-panel {
		border:1px solid var(--line-strong);
		background:var(--bg-1);
		padding:20px;
		display:flex; align-items:center; gap:12px; flex-wrap:wrap;
		margin-bottom:16px;
	}
	.add-stock-panel-label {
		font-family:var(--mono); font-size:10px; font-weight:600;
		letter-spacing:1.5px; text-transform:uppercase; color:var(--txt-3);
		flex-shrink:0;
	}
	.field {
		background:var(--bg-2); border:1px solid var(--line-strong);
		color:var(--txt); padding:8px 12px; font-size:13px;
		transition:border-color var(--t);
	}
	.field:focus { outline:none; border-color:var(--txt-3); }
	.field::placeholder { color:var(--txt-3); }
	.field-sym { font-family:var(--mono); font-weight:700; letter-spacing:1px; text-transform:uppercase; width:130px; }
	.field-sym::placeholder { text-transform:none; letter-spacing:0; font-weight:400; }
	.field-name { width:180px; }

	/* ═══════════════════════════════════════════════
	   NOTES
	═══════════════════════════════════════════════ */
	.notes-ta {
		width:100%; resize:vertical;
		background:var(--bg-1); border:1px solid var(--line-strong);
		color:var(--txt); padding:16px; font-size:13px; line-height:1.7;
		transition:border-color var(--t);
	}
	.notes-ta:focus { outline:none; border-color:var(--txt-3); }
	.notes-ta::placeholder { color:var(--txt-3); }

	/* ═══════════════════════════════════════════════
	   MODAL
	═══════════════════════════════════════════════ */
	.overlay {
		position:fixed; inset:0;
		background:rgba(0,0,0,0.85); backdrop-filter:blur(6px);
		display:flex; align-items:center; justify-content:center;
		z-index:1000; padding:20px;
	}
	.modal {
		background:var(--bg-1);
		border:1px solid var(--line-strong);
		padding:32px; width:100%; max-width:440px;
		box-shadow:0 24px 80px rgba(0,0,0,0.6);
	}
	.modal-title {
		font-size:18px; font-weight:700; letter-spacing:-0.4px;
		margin-bottom:24px;
	}
	.modal-label {
		font-family:var(--mono); font-size:10px; font-weight:600;
		letter-spacing:1.5px; text-transform:uppercase;
		color:var(--txt-3); margin-bottom:8px; display:block;
	}
	.modal-field {
		width:100%; background:var(--bg-2); border:1px solid var(--line-strong);
		color:var(--txt); padding:10px 14px; font-size:14px; margin-bottom:20px;
		transition:border-color var(--t);
	}
	.modal-field:focus { outline:none; border-color:var(--txt-3); }
	.modal-note {
		font-size:12px; color:var(--txt-3); background:var(--bg-2);
		border:1px solid var(--line); padding:10px 14px;
		margin-bottom:24px; line-height:1.6;
	}
	.modal-actions { display:flex; gap:10px; justify-content:flex-end; }

	/* JSON modal */
	.json-ta {
		width:100%; height:200px; resize:vertical;
		background:var(--bg-2); border:1px solid var(--line);
		color:var(--txt-2); padding:12px; font-family:var(--mono);
		font-size:11px; line-height:1.5;
	}
	.json-ta:focus { outline:none; }
	.json-filename {
		font-family:var(--mono); font-size:12px;
		color:var(--accent); background:var(--bg-2); border:1px solid var(--line);
		padding:8px 12px; margin-bottom:12px; word-break:break-all;
	}
	[data-theme="light"] .json-filename { color:var(--txt); }

	/* ═══════════════════════════════════════════════
	   CONFIRM DIALOG
	═══════════════════════════════════════════════ */
	.confirm-overlay {
		position:fixed; inset:0;
		background:rgba(0,0,0,0.82); backdrop-filter:blur(8px);
		display:flex; align-items:center; justify-content:center;
		z-index:1100; padding:20px;
	}
	.confirm-box {
		background:var(--bg-1);
		border:1px solid var(--line-strong);
		border-left:3px solid var(--danger);
		width:100%; max-width:380px;
		box-shadow:0 24px 64px rgba(0,0,0,0.65);
		overflow:hidden;
	}
	.confirm-inner {
		padding:26px 24px 22px;
	}
	/* 標題列：感嘆號 + 標題並排 */
	.confirm-head {
		display:flex; align-items:center; gap:11px;
		margin-bottom:14px;
	}
	.confirm-badge {
		width:22px; height:22px; flex-shrink:0;
		background:var(--danger); color:#fff;
		font-family:var(--mono); font-size:13px; font-weight:700;
		display:flex; align-items:center; justify-content:center;
		line-height:1;
	}
	.confirm-title {
		font-size:15px; font-weight:700; letter-spacing:-0.2px;
		color:var(--txt);
	}
	.confirm-msg {
		font-size:13px; color:var(--txt-2);
		line-height:1.7; padding-left:33px;
	}
	/* 重點資訊區塊（stock symbol / tx info）*/
	.confirm-msg strong {
		display:block; margin-top:10px;
		color:var(--txt); font-family:var(--mono);
		font-size:12px; font-weight:600; letter-spacing:0.4px;
		background:var(--bg-2); border:1px solid var(--line-strong);
		padding:7px 12px;
	}
	.confirm-actions {
		display:flex; gap:8px; justify-content:flex-end;
		padding:12px 24px 14px;
		border-top:1px solid var(--line);
	}

	/* ═══════════════════════════════════════════════
	   TOAST
	═══════════════════════════════════════════════ */
	.toasts {
		position:fixed; bottom:24px; right:24px; z-index:2000;
		display:flex; flex-direction:column; gap:6px;
	}
	.toast {
		background:var(--bg-1); border:1px solid var(--line-strong);
		padding:10px 16px; font-size:12px; font-family:var(--mono);
		display:flex; align-items:center; gap:10px;
		max-width:300px; letter-spacing:0.3px;
	}
	.toast.success { border-left:2px solid var(--ok);      color:var(--txt); }
	.toast.error   { border-left:2px solid var(--danger);  color:var(--txt); }
	.toast.info    { border-left:2px solid var(--txt-3);   color:var(--txt); }
	.toast.warning { border-left:2px solid var(--warn);    color:var(--txt); }

	/* ═══════════════════════════════════════════════
	   PROFIT / NUMBER CELLS
	═══════════════════════════════════════════════ */
	.num { font-family:var(--mono); font-size:13px; white-space:nowrap; }
	.num.gain { color:var(--gain); }
	.num.loss { color:var(--loss); }

	/* ═══════════════════════════════════════════════
	   DIVIDER
	═══════════════════════════════════════════════ */
	.divider { height:1px; background:var(--line-strong); margin:40px 0; }

	/* ═══════════════════════════════════════════════
	   TRANSITIONS
	═══════════════════════════════════════════════ */
	/* 折疊動畫 */
	.collapse-enter-active,
	.collapse-leave-active {
		transition: opacity 0.22s ease, max-height 0.28s cubic-bezier(0.4,0,0.2,1);
		max-height: 2000px;
		opacity: 1;
	}
	.collapse-enter-from,
	.collapse-leave-to {
		max-height: 0;
		opacity: 0;
		overflow: hidden;
	}

	.fade-enter-active,.fade-leave-active { transition:opacity 0.15s, transform 0.15s; }
	.fade-enter-from,.fade-leave-to { opacity:0; transform:translateY(-8px); }
	.slide-enter-active { transition:all 0.2s var(--ease); }
	.slide-leave-active { transition:all 0.15s ease; }
	.slide-enter-from { opacity:0; transform:translateY(-10px); }
	.slide-leave-to { opacity:0; }
	.list-enter-active { transition:all 0.22s var(--ease); }
	.list-leave-active { transition:all 0.15s ease; }
	.list-enter-from { opacity:0; transform:translateX(-12px); }
	.list-leave-to { opacity:0; transform:translateX(12px); }

	/* ═══════════════════════════════════════════════
	   RESPONSIVE
	═══════════════════════════════════════════════ */
	@media(max-width:768px) {
		.wrap { padding:0 16px 60px; }
		.kpi-grid { grid-template-columns:repeat(2,1fr); }
		.card-stats { display:none; }
		.tx-table thead th:nth-child(n+6),.tx-table td:nth-child(n+6) { display:none; }
	}
	@media(max-width:480px) {
		.kpi-grid { grid-template-columns:1fr; }
		.welcome-h1 { letter-spacing:-1px; }
	}
	</style>
</head>
<body>
<div id="app">
<div class="wrap">

	<!-- ── HEADER ── -->
	<header class="header">
		<div class="logo">
			<span class="logo-mark">IT</span>
			<span class="logo-name">InvestTrack</span>
		</div>
		<div class="header-sep"></div>
		<div class="header-actions">
			<button class="btn" @click="showNewReportModal = true">+ 新報表</button>
			<button class="btn" @click="triggerFileUpload">↑ 載入</button>
			<button class="btn btn-accent" @click="downloadReport" :disabled="stocks.length === 0">↓ 下載報表</button>
			<button class="theme-btn" @click="toggleTheme" :title="isDark?'亮色模式':'暗色模式'">
				{{ isDark ? '○' : '●' }}
			</button>
		</div>
		<input type="file" ref="fileInput" accept=".json" style="display:none" @change="loadReport" />
	</header>

	<!-- ── WELCOME ── -->
	<div v-if="!hasReport" class="welcome">
		<div class="welcome-tag">// 股票投資組合追蹤器</div>
		<h1 class="welcome-h1">追蹤你的<br><em>每一分投資</em></h1>
		<p class="welcome-sub">精確計算個股與整體的投資報酬率，完整紀錄每一筆買賣交易，讓你的投資組合一目瞭然。</p>
		<div class="welcome-btns">
			<button class="btn btn-accent" style="font-size:13px;padding:12px 28px" @click="showNewReportModal=true">
				+ 建立新報表
			</button>
			<button class="btn btn-dim" style="font-size:13px;padding:12px 28px" @click="triggerFileUpload">
				↑ 載入既有報表
			</button>
		</div>
		<div class="drop-zone" @click="triggerFileUpload"
			@dragover.prevent="dragOver=true" @dragleave="dragOver=false"
			@drop.prevent="onDrop" :class="{over:dragOver}">
			<div class="drop-zone-icon">⬡</div>
			<div class="drop-zone-label">拖曳 .json 報表至此</div>
			<div class="drop-zone-sub">或點擊選擇檔案</div>
		</div>
	</div>

	<!-- ── MAIN CONTENT ── -->
	<template v-if="hasReport">

		<!-- Report bar -->
		<div class="report-bar">
			<input class="report-name" v-model="reportName" placeholder="未命名報表" />
			<span class="report-meta">已更新 {{ lastSaved }}</span>
			<span class="report-meta">{{ transactions.length }} 筆交易</span>
		</div>

		<!-- KPI Grid -->
		<div class="kpi-grid">
			<div class="kpi hero">
				<div class="kpi-label">總損益</div>
				<div class="kpi-value" :class="totalProfit>=0?'gain':'loss'" id="anim-profit">—</div>
				<div class="kpi-sub">已實現損益（含手續費）</div>
			</div>
			<div class="kpi hero">
				<div class="kpi-label">整體投報率</div>
				<div class="kpi-value" :class="totalROI>=0?'gain':'loss'" id="anim-roi">—</div>
				<div class="kpi-sub">整體投資報酬率</div>
			</div>
			<div class="kpi">
				<div class="kpi-label">累計成本</div>
				<div class="kpi-value" id="anim-cost">—</div>
				<div class="kpi-sub">累計買入成本</div>
			</div>
			<div class="kpi">
				<div class="kpi-label">累計收入</div>
				<div class="kpi-value" id="anim-revenue">—</div>
				<div class="kpi-sub">累計賣出收入</div>
			</div>
			<div class="kpi">
				<div class="kpi-label">未實現損益</div>
				<div class="kpi-value" :class="unrealizedProfit>=0?'gain':'loss'" id="anim-unrealized">—</div>
				<div class="kpi-sub">{{ holdingShares }} 股持倉未實現</div>
			</div>
			<div class="kpi">
				<div class="kpi-label">交易筆數</div>
				<div class="kpi-value">{{ transactions.length }}</div>
				<div class="kpi-sub">買 {{ buyCount }} ／ 賣 {{ sellCount }}</div>
			</div>
		</div>

		<!-- Individual Stock Analysis -->
		<div class="section-row">
			<span class="section-label">// 個股分析</span>
		</div>
		<div class="analysis-wrap" v-if="stocks.length > 0">
			<table>
				<thead>
					<tr>
						<th>代號</th>
						<th>名稱</th>
						<th>買入成本</th>
						<th>賣出收入</th>
						<th>損益</th>
						<th>ROI</th>
						<th>持倉股數</th>
						<th>持倉成本</th>
					</tr>
				</thead>
				<tbody>
					<tr v-for="s in stockSummaries" :key="s.symbol">
						<td><span class="sym">{{ s.symbol }}</span></td>
						<td style="color:var(--txt-2);font-size:13px">{{ s.name || '—' }}</td>
						<td class="num">{{ formatCurrency(s.totalBuyCost) }}</td>
						<td class="num">{{ formatCurrency(s.totalSellRevenue) }}</td>
						<td class="num" :class="s.profit>=0?'gain':'loss'">{{ formatCurrency(s.profit) }}</td>
						<td>
							<div class="num" :class="s.roi>=0?'gain':'loss'" style="font-size:13px;font-weight:700">{{ formatPct(s.roi) }}</div>
							<div class="roi-bar">
								<div class="roi-bar-fill" :style="{width:Math.min(Math.abs(s.roi),100)+'%',background:s.roi>=0?'var(--gain)':'var(--loss)'}"></div>
							</div>
						</td>
						<td class="num">{{ s.holdingShares }}</td>
						<td class="num">{{ s.holdingShares>0 ? formatCurrency(s.holdingCost) : '—' }}</td>
					</tr>
				</tbody>
			</table>
		</div>

		<div class="divider"></div>

		<!-- Transaction Records -->
		<div class="section-row" style="margin-bottom:12px">
			<span class="section-label">// 交易紀錄</span>
			<button class="btn" @click="showAddStockInput=!showAddStockInput">+ 新增股票</button>
		</div>

		<!-- Add stock panel -->
		<transition name="slide">
			<div class="add-stock-panel" v-if="showAddStockInput">
				<span class="add-stock-panel-label">新增股票</span>
				<input class="field field-sym" v-model="newStockSymbol" placeholder="代號 (如 2330)" maxlength="8" @keyup.enter="addStock" />
				<input class="field field-name" v-model="newStockName" placeholder="公司名稱 (如 台積電)" @keyup.enter="addStock" />
				<button class="btn btn-accent" @click="addStock">確認</button>
				<button class="btn" @click="showAddStockInput=false;newStockSymbol='';newStockName=''">取消</button>
			</div>
		</transition>

		<!-- Stock cards -->
		<div class="cards">
			<transition-group name="list">
				<div class="card-outer"
					v-for="stock in stocks" :key="stock.symbol"
					draggable="true"
					:class="{'is-dragging':dragState.draggingSymbol===stock.symbol,'drag-over':dragState.overSymbol===stock.symbol&&dragState.draggingSymbol!==stock.symbol}"
					@dragstart="onDragStart($event,stock.symbol)"
					@dragover.prevent="onDragOver($event,stock.symbol)"
					@dragleave="onDragLeave"
					@drop.prevent="onStockDrop($event,stock.symbol)"
					@dragend="onDragEnd">

					<div class="card-head" :class="{'is-collapsed': collapsedStocks.has(stock.symbol)}" @click="toggleCollapse(stock.symbol)">
						<span class="drag-handle" title="拖曳排序" @click.stop>⠿</span>
						<button class="collapse-btn"
							:class="{'is-collapsed': collapsedStocks.has(stock.symbol)}"
							:title="collapsedStocks.has(stock.symbol) ? '展開' : '折疊'">▼</button>
						<span class="card-sym">{{ stock.symbol }}</span>
						<input class="card-name-input" v-model="stock.name" :placeholder="stock.symbol+' 名稱'" @click.stop @focus.stop />
						<div class="card-stats">
							<div class="card-stat">
								<div class="card-stat-label">損益</div>
								<div class="card-stat-val" :class="getStockSummary(stock.symbol).profit>=0?'gain':'loss'">
									{{ formatCurrency(getStockSummary(stock.symbol).profit) }}
								</div>
							</div>
							<div class="card-stat">
								<div class="card-stat-label">ROI</div>
								<div class="card-stat-val" :class="getStockSummary(stock.symbol).roi>=0?'gain':'loss'">
									{{ formatPct(getStockSummary(stock.symbol).roi) }}
								</div>
							</div>
							<div class="card-stat" v-if="getStockSummary(stock.symbol).holdingShares>0">
								<div class="card-stat-label">持倉</div>
								<div class="card-stat-val" style="color:var(--txt-2)">{{ getStockSummary(stock.symbol).holdingShares }} 股</div>
							</div>
						</div>
						<button class="btn btn-danger btn-icon" @click.stop="removeStock(stock.symbol)" title="刪除">×</button>
					</div>

					<transition name="collapse">
					<div class="card-body-wrap" v-show="!collapsedStocks.has(stock.symbol)">
					<div class="tx-wrap">
						<table class="tx-table" v-if="getStockTransactions(stock.symbol).length>0">
							<thead>
								<tr>
									<th>類型</th>
									<th>日期</th>
									<th>成交價</th>
									<th>股數</th>
									<th>手續費</th>
									<th>含費總額</th>
									<th>備註</th>
									<th></th>
								</tr>
							</thead>
							<tbody>
								<tr v-for="tx in getStockTransactions(stock.symbol)" :key="tx.id" :data-tx-id="tx.id">
									<td>
										<select class="td-sel" v-model="tx.type" @change="markDirty">
											<option value="buy">買入</option>
											<option value="sell">賣出</option>
										</select>
									</td>
									<td><input type="date" class="td-in" v-model="tx.date" @change="markDirty" /></td>
									<td><input type="number" class="td-in mono" v-model.number="tx.price" min="0" step="0.01" @input="markDirty" placeholder="0.00" style="width:88px" /></td>
									<td><input type="number" class="td-in mono" v-model.number="tx.shares" min="1" step="1" @input="markDirty" placeholder="0" style="width:68px" /></td>
									<td><input type="number" class="td-in mono" v-model.number="tx.fee" min="0" step="1" @input="markDirty" placeholder="0" style="width:76px" /></td>
									<td>
										<span class="td-total" :class="tx.type">{{ formatCurrency(calcTotal(tx)) }}</span>
									</td>
									<td><input type="text" class="td-in" v-model="tx.note" @input="markDirty" placeholder="備註…" style="min-width:80px" /></td>
									<td>
										<button class="btn btn-danger btn-icon" style="font-size:15px" @click="removeTransaction(tx.id)">×</button>
									</td>
								</tr>
							</tbody>
						</table>
						<div v-else class="tx-empty">— 尚無交易紀錄 —</div>
					</div><!-- /tx-wrap -->
					<button class="add-row-btn" @click="addTransaction(stock.symbol)">
						+ 新增 {{ stock.symbol }} 交易
					</button>
					</div><!-- /card-body-wrap -->
					</transition>
				</div><!-- /card-outer -->
			</transition-group>
		</div>

		<div v-if="stocks.length===0" style="padding:48px 0;text-align:center;color:var(--txt-3);font-family:var(--mono);font-size:12px;letter-spacing:1px">
			— 點擊「新增股票」開始建立紀錄 —
		</div>

		<!-- Notes -->
		<div class="section-row" style="margin-bottom:12px">
			<span class="section-label">// Notes</span>
		</div>
		<textarea class="notes-ta" v-model="reportNotes" placeholder="投資備忘、策略、提醒事項…" rows="4" @input="markDirty"></textarea>

	</template>
</div><!-- /wrap -->

<!-- ── NEW REPORT MODAL ── -->
<transition name="fade">
	<div class="overlay" v-if="showNewReportModal" @click.self="showNewReportModal=false">
		<div class="modal">
			<div class="modal-title">建立新報表</div>
			<label class="modal-label">報表名稱</label>
			<input class="modal-field" v-model="newReportName" placeholder="例：2025 年度投資" @keyup.enter="createNewReport" autofocus />
			<div class="modal-note" style="border-color:var(--danger-border);color:var(--danger);background:var(--danger-dim);"><span style="font-family:var(--mono);font-weight:700;margin-right:6px">!</span>建立新報表將清除目前資料，請先下載備份。</div>
			<div class="modal-actions">
				<button class="btn" @click="showNewReportModal=false">取消</button>
				<button class="btn btn-accent" @click="createNewReport">建立</button>
			</div>
		</div>
	</div>
</transition>

<!-- ── JSON EXPORT MODAL ── -->
<transition name="fade">
	<div class="overlay" v-if="showJsonModal" @click.self="showJsonModal=false">
		<div class="modal" style="max-width:560px">
			<div class="modal-title">💾 儲存報表</div>
			<div style="font-size:13px;color:var(--txt-2);margin-bottom:14px;line-height:1.7">
				複製以下內容，貼入文字編輯器後存成 <code style="font-family:var(--mono);color:var(--accent)">.json</code> 檔。
			</div>
			<div class="json-filename">{{ exportedFilename }}</div>
			<textarea class="json-ta" readonly :value="exportedJson" @click="$event.target.select()"></textarea>
			<div style="font-size:11px;color:var(--txt-3);margin-top:6px;font-family:var(--mono)">點擊文字區域可全選</div>
			<div class="modal-actions" style="margin-top:20px">
				<button class="btn" @click="showJsonModal=false">關閉</button>
				<button class="btn btn-accent" @click="copyJson">複製全部</button>
			</div>
		</div>
	</div>
</transition>

<!-- ── CONFIRM DIALOG ── -->
<transition name="fade">
	<div class="confirm-overlay" v-if="confirmDialog.show">
		<div class="confirm-box">
			<div class="confirm-inner">
				<div class="confirm-head">
					<div class="confirm-badge">!</div>
					<div class="confirm-title">{{ confirmDialog.title }}</div>
				</div>
				<div class="confirm-msg" v-html="confirmDialog.message"></div>
			</div>
			<div class="confirm-actions">
				<button class="btn" @click="confirmResolve(false)">{{ confirmDialog.cancelLabel || '取消' }}</button>
				<button class="btn btn-danger" @click="confirmResolve(true)">{{ confirmDialog.confirmLabel || '確認刪除' }}</button>
			</div>
		</div>
	</div>
</transition>

<!-- ── TOASTS ── -->
<div class="toasts">
	<transition-group name="list">
		<div class="toast" :class="t.type" v-for="t in toasts" :key="t.id">
			<span>{{ t.icon }}</span><span>{{ t.msg }}</span>
		</div>
	</transition-group>
</div>

</div><!-- /app -->

<script>
const { createApp, ref, computed, watch, nextTick, onMounted } = Vue;

createApp({
	setup() {
		const isDark = ref(true);
		const hasReport = ref(false);
		const reportName = ref(null);
		const reportNotes = ref('');
		const lastSaved = ref('');
		const stocks = ref([]);
		const transactions = ref([]);
		const showNewReportModal = ref(false);
		const showAddStockInput = ref(false);
		const newStockSymbol = ref('');
		const newStockName = ref('');
		const newReportName = ref('');
		const fileInput = ref(null);
		const toasts = ref([]);
		const dragOver = ref(false);
		const showJsonModal = ref(false);
		const dragState = ref({ draggingSymbol: null, overSymbol: null });
		const collapsedStocks = ref(new Set());
		const exportedJson = ref('');
		const exportedFilename = ref('');
		let txIdCounter = 1;

		let themeRotation = 0;
		const toggleTheme = (e) => {
			isDark.value = !isDark.value;
			document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
			const btn = e?.currentTarget;
			if (btn) {
				themeRotation += 180;
				anime({
					targets: btn,
					rotate: themeRotation,
					scale: [1, 0.85, 1],
					duration: 420,
					easing: 'easeOutElastic(1, .6)'
				});
			}
		};

		const addToast = (msg, type = 'info', icon = '') => {
			const id = Date.now();
			toasts.value.push({ id, msg, type, icon });
			setTimeout(() => { toasts.value = toasts.value.filter(t => t.id !== id); }, 3200);
		};

		const formatCurrency = (val, forceCompact = false) => {
			if (val === undefined || val === null || isNaN(val)) return '—';
			const sign = val < 0 ? '−$' : '$';
			const abs = Math.abs(val);

			// Full format first — check if it would be "long"
			const full = abs.toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
			const fullStr = sign + full;

			// Threshold: 9 chars (e.g. "$999,999" = 8 chars, "$1,000,000" = 10 chars)
			// Only abbreviate if full string is >= 9 chars (meaning 7+ digit numbers i.e. ≥1,000,000)
			// or if explicitly requested
			if (!forceCompact && fullStr.length < 10) return fullStr;

			// Compact: M for millions, K for ten-thousands and above
			if (abs >= 1_000_000) {
				const n = abs / 1_000_000;
				const decimals = n < 10 ? 2 : n < 100 ? 1 : 0;
				return sign + n.toFixed(decimals) + 'M';
			}
			if (abs >= 10_000) {
				const n = abs / 1_000;
				const decimals = n < 100 ? 1 : 0;
				return sign + n.toFixed(decimals) + 'K';
			}
			return fullStr;
		};
		const formatPct = (val) => {
			if (val === undefined || val === null || isNaN(val) || !isFinite(val)) return '—';
			return (val >= 0 ? '+' : '') + val.toFixed(2) + '%';
		};

		const calcTotal = (tx) => {
			const base = (tx.price || 0) * (tx.shares || 0);
			const fee = tx.fee || 0;
			return tx.type === 'buy' ? base + fee : base - fee;
		};

		const getStockTransactions = (symbol) =>
			transactions.value.filter(tx => tx.symbol === symbol)
				.sort((a, b) => new Date(a.date) - new Date(b.date));

		const getStockSummary = (symbol) => {
			const txs = getStockTransactions(symbol);
			let totalBuyCost = 0, totalSellRevenue = 0;
			let holdingShares = 0, holdingCost = 0;
			for (const tx of txs) {
				const total = calcTotal(tx);
				if (tx.type === 'buy') {
					totalBuyCost += total;
					holdingShares += (tx.shares || 0);
					holdingCost += total;
				} else {
					totalSellRevenue += total;
					const avgCost = holdingShares > 0 ? holdingCost / holdingShares : 0;
					const soldCost = avgCost * (tx.shares || 0);
					holdingCost -= soldCost;
					holdingShares -= (tx.shares || 0);
					if (holdingShares < 0) holdingShares = 0;
					if (holdingCost < 0) holdingCost = 0;
				}
			}
			const soldCostTotal = totalBuyCost - holdingCost;
			const realizedProfit = totalSellRevenue - soldCostTotal;
			const roi = soldCostTotal > 0 ? (realizedProfit / soldCostTotal) * 100 : 0;
			return { symbol, totalBuyCost, totalSellRevenue, profit: realizedProfit, roi, holdingShares, holdingCost };
		};

		const stockSummaries = computed(() => stocks.value.map(s => ({ ...getStockSummary(s.symbol), name: s.name })));
		const totalCost = computed(() => transactions.value.filter(t => t.type==='buy').reduce((s,t) => s+calcTotal(t), 0));
		const totalRevenue = computed(() => transactions.value.filter(t => t.type==='sell').reduce((s,t) => s+calcTotal(t), 0));
		const totalProfit = computed(() => stockSummaries.value.reduce((s,x) => s+x.profit, 0));
		const totalROI = computed(() => {
			const cost = stockSummaries.value.reduce((s,x) => s+(x.totalBuyCost-x.holdingCost), 0);
			return cost > 0 ? (totalProfit.value / cost) * 100 : 0;
		});
		const unrealizedProfit = computed(() => stockSummaries.value.reduce((s,x) => s+(x.holdingCost>0?-x.holdingCost:0), 0));
		const holdingShares = computed(() => stockSummaries.value.reduce((s,x) => s+x.holdingShares, 0));
		const buyCount = computed(() => transactions.value.filter(t => t.type==='buy').length);
		const sellCount = computed(() => transactions.value.filter(t => t.type==='sell').length);

		let animTimeout = null;
		const animateNumbers = () => {
			if (animTimeout) clearTimeout(animTimeout);
			animTimeout = setTimeout(() => {
				[
					{ id:'anim-profit',     val:totalProfit.value,     isCur:true },
					{ id:'anim-roi',        val:totalROI.value,        isCur:false },
					{ id:'anim-cost',       val:totalCost.value,       isCur:true },
					{ id:'anim-revenue',    val:totalRevenue.value,    isCur:true },
					{ id:'anim-unrealized', val:unrealizedProfit.value,isCur:true },
				].forEach(({ id, val, isCur }) => {
					const el = document.getElementById(id);
					if (!el) return;
					anime({
						targets: { n: 0 }, n: val,
						duration: 900, easing: 'easeOutExpo',
						update(a) {
							const v = a.animations[0].currentValue;
							el.textContent = isCur ? formatCurrency(v) : formatPct(v);
						}
					});
				});
			}, 80);
		};
		watch([totalProfit, totalROI, totalCost, totalRevenue], animateNumbers);

		// ── KPI Grid Entrance (staggered reveal, anime.js stagger utility) ──
		const animateKpiEntrance = () => {
			nextTick(() => {
				const kpis = document.querySelectorAll('.kpi');
				if (!kpis.length) return;
				anime.set(kpis, { opacity: 0, translateY: 14 });
				anime({
					targets: kpis,
					opacity: [0, 1],
					translateY: [14, 0],
					duration: 560,
					easing: 'easeOutQuart',
					delay: anime.stagger(55)
				});
			});
		};

		// ── Stock card entrance (staggered) ──
		const animateCardsEntrance = () => {
			nextTick(() => {
				const cards = document.querySelectorAll('.card-outer');
				if (!cards.length) return;
				anime.set(cards, { opacity: 0, translateX: -10 });
				anime({
					targets: cards,
					opacity: [0, 1],
					translateX: [-10, 0],
					duration: 420,
					easing: 'easeOutQuart',
					delay: anime.stagger(45)
				});
			});
		};

		const addStock = () => {
			const sym = newStockSymbol.value.trim().toUpperCase();
			if (!sym) { addToast('請輸入股票代號', 'error', '✕'); return; }
			if (stocks.value.find(s => s.symbol === sym)) { addToast(`${sym} 已存在`, 'error', '✕'); return; }
			stocks.value.push({ symbol: sym, name: newStockName.value.trim() });
			newStockSymbol.value = ''; newStockName.value = '';
			showAddStockInput.value = false;
			addToast(`已新增 ${sym}`, 'success', '✓');
			markDirty();
		};

		// ── 客製確認框（Promise-based）──
		const isDirty = ref(false);
		const confirmDialog = ref({ show:false, title:'', message:'', cancelLabel:'取消', confirmLabel:'確認刪除' });
		let confirmResolveRef = null;

		const showConfirm = ({ title, message, cancelLabel='取消', confirmLabel='確認刪除' }) => {
			return new Promise((resolve) => {
				confirmDialog.value = { show:true, title, message, cancelLabel, confirmLabel };
				confirmResolveRef = resolve;
			});
		};

		const confirmResolve = (result) => {
			confirmDialog.value.show = false;
			if (confirmResolveRef) { confirmResolveRef(result); confirmResolveRef = null; }
		};

		const removeStock = async (symbol) => {
			const name = stocks.value.find(s => s.symbol === symbol)?.name;
			const label = name ? `${symbol}（${name}）` : symbol;
			const txCount = transactions.value.filter(t => t.symbol === symbol).length;
			const ok = await showConfirm({
				title: '刪除股票',
				message: `確定要刪除<strong>${label}</strong><span style="display:block;margin-top:10px">及其 ${txCount} 筆交易紀錄？</span>`
			});
			if (!ok) return;
			stocks.value = stocks.value.filter(s => s.symbol !== symbol);
			transactions.value = transactions.value.filter(t => t.symbol !== symbol);
			addToast(`已刪除 ${symbol}`, 'warning', '✓');
			markDirty();
		};

		const addTransaction = (symbol) => {
			const today = new Date().toISOString().split('T')[0];
			const newId = txIdCounter++;
			transactions.value.push({ id: newId, symbol, type:'buy', date:today, price:null, shares:null, fee:0, note:'' });
			markDirty();
			nextTick(() => {
				const row = document.querySelector(`tr[data-tx-id="${newId}"]`);
				if (row) {
					const flashColor = isDark.value ? 'rgba(232,255,71,0.16)' : 'rgba(0,0,0,0.06)';
					anime({
						targets: row,
						backgroundColor: [flashColor, 'rgba(0,0,0,0)'],
						duration: 750,
						easing: 'easeOutQuad'
					});
				}
			});
		};

		const removeTransaction = async (id) => {
			const tx = transactions.value.find(t => t.id === id);
			if (!tx) return;
			const dateStr = tx.date || '—';
			const typeStr = tx.type === 'buy' ? '買入' : '賣出';
			const ok = await showConfirm({
				title: '刪除交易紀錄',
				message: `確定要刪除這筆交易？<br><strong>${tx.symbol}｜${typeStr}｜${dateStr}</strong>`
			});
			if (!ok) return;
			transactions.value = transactions.value.filter(t => t.id !== id);
			markDirty();
		};

		const markDirty = () => {
			lastSaved.value = new Date().toLocaleTimeString('zh-TW');
			isDirty.value = true;
		};

		const createNewReport = () => {
			reportName.value = newReportName.value || '未命名報表';
			reportNotes.value = ''; stocks.value = []; transactions.value = [];
			txIdCounter = 1; hasReport.value = true;
			showNewReportModal.value = false; newReportName.value = '';
			lastSaved.value = new Date().toLocaleTimeString('zh-TW');
			isDirty.value = false;
			addToast('已建立新報表', 'success', '✓');
			nextTick(animateNumbers); animateKpiEntrance(); animateCardsEntrance();
		};

		const downloadReport = () => {
			const data = {
				version:'1.0', reportName:reportName.value, reportNotes:reportNotes.value,
				exportedAt:new Date().toISOString(), stocks:stocks.value, transactions:transactions.value,
				summary:{ totalCost:totalCost.value, totalRevenue:totalRevenue.value, totalProfit:totalProfit.value, totalROI:totalROI.value }
			};
			const json = JSON.stringify(data, null, 2);
			const filename = `投資報表_${reportName.value || '未命名報表'}.json`;
			if (window.showSaveFilePicker) {
				window.showSaveFilePicker({
					suggestedName: filename,
					types: [{ description:'JSON 報表', accept:{'application/json':['.json']} }]
				}).then(async (fh) => {
					const w = await fh.createWritable();
					await w.write(json); await w.close();
					isDirty.value = false;
					addToast('報表已儲存', 'success', '↓');
				}).catch(err => {
					if (err.name !== 'AbortError') { exportedJson.value=json; exportedFilename.value=filename; showJsonModal.value=true; }
				});
				return;
			}
			exportedJson.value = json; exportedFilename.value = filename; showJsonModal.value = true;
		};

		const triggerFileUpload = async () => {
			if (isDirty.value && hasReport.value) {
				const ok = await showConfirm({
					title: '載入新報表',
					message: '目前的報表有未下載的變更。<strong>載入後目前的資料將會消失。</strong>',
					cancelLabel: '取消',
					confirmLabel: '繼續載入',
				});
				if (!ok) return;
			}
			fileInput.value?.click();
		};

		const loadReportData = (data) => {
			try {
				if (!data.stocks || !data.transactions) throw new Error();
				reportName.value = data.reportName || '載入的報表';
				reportNotes.value = data.reportNotes || '';
				stocks.value = data.stocks; transactions.value = data.transactions;
				txIdCounter = Math.max(0, ...transactions.value.map(t => t.id||0)) + 1;
				hasReport.value = true; lastSaved.value = new Date().toLocaleTimeString('zh-TW');
				isDirty.value = false;
				addToast(`已載入：${reportName.value}`, 'success', '✓');
				nextTick(animateNumbers); animateKpiEntrance(); animateCardsEntrance();
			} catch { addToast('檔案格式不正確', 'error', '✕'); }
		};

		const loadReport = (e) => {
			const file = e.target.files[0]; if (!file) return;
			const r = new FileReader();
			r.onload = ev => { try { loadReportData(JSON.parse(ev.target.result)); } catch { addToast('無法解析檔案', 'error', '✕'); } };
			r.readAsText(file); e.target.value = '';
		};

		const onDrop = async (e) => {
			dragOver.value = false;
			const file = e.dataTransfer.files[0];
			if (!file || !file.name.endsWith('.json')) { addToast('請拖入 .json 檔案', 'error', '✕'); return; }
			if (isDirty.value && hasReport.value) {
				const ok = await showConfirm({
					title: '載入新報表',
					message: '目前的報表有未下載的變更。<strong>載入後目前的資料將會消失。</strong>',
					cancelLabel: '取消',
					confirmLabel: '繼續載入',
				});
				if (!ok) return;
			}
			const r = new FileReader();
			r.onload = ev => { try { loadReportData(JSON.parse(ev.target.result)); } catch { addToast('無法解析檔案', 'error', '✕'); } };
			r.readAsText(file);
		};

		const onDragStart = (e, symbol) => { dragState.value.draggingSymbol=symbol; e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',symbol); };
		const onDragOver  = (e, symbol) => { e.dataTransfer.dropEffect='move'; dragState.value.overSymbol=symbol; };
		const onDragLeave = () => { dragState.value.overSymbol=null; };
		const onDragEnd   = () => { dragState.value.draggingSymbol=null; dragState.value.overSymbol=null; };
		const onStockDrop = (e, targetSymbol) => {
			const from = dragState.value.draggingSymbol;
			if (!from || from===targetSymbol) { onDragEnd(); return; }
			const arr=[...stocks.value];
			const fi=arr.findIndex(s=>s.symbol===from), ti=arr.findIndex(s=>s.symbol===targetSymbol);
			if (fi===-1||ti===-1) { onDragEnd(); return; }
			const [item]=arr.splice(fi,1); arr.splice(ti,0,item);
			stocks.value=arr; onDragEnd(); markDirty();
		};

		// ── 折疊/展開 ──
		const toggleCollapse = (symbol) => {
			const s = collapsedStocks.value;
			if (s.has(symbol)) {
				s.delete(symbol);
			} else {
				s.add(symbol);
			}
			// 觸發 Vue 響應式更新（Set mutation 不自動觸發）
			collapsedStocks.value = new Set(s);
		};

		const copyJson = () => {
			navigator.clipboard.writeText(exportedJson.value)
				.then(() => addToast('已複製到剪貼簿', 'success', '✓'))
				.catch(() => addToast('請手動全選複製', 'info', 'i'));
		};

		window.addEventListener('beforeunload', (e) => {
			if (isDirty.value && hasReport.value) {
				e.preventDefault();
				e.returnValue = '';
			}
			// 頁面真的關閉時清除資料
		});
		window.addEventListener('unload', () => { stocks.value=[]; transactions.value=[]; });

		// ── Welcome screen entrance (timeline-orchestrated reveal) ──
		onMounted(() => {
			if (hasReport.value) return;
			nextTick(() => {
				const tl = anime.timeline({ easing: 'easeOutQuart' });
				tl.add({
					targets: '.welcome-tag',
					opacity: [0, 1],
					translateY: [10, 0],
					duration: 420
				}).add({
					targets: '.welcome-h1',
					opacity: [0, 1],
					translateY: [16, 0],
					duration: 560
				}, '-=280').add({
					targets: '.welcome-sub',
					opacity: [0, 1],
					translateY: [12, 0],
					duration: 480
				}, '-=340').add({
					targets: '.welcome-btns .btn',
					opacity: [0, 1],
					translateY: [10, 0],
					duration: 420,
					delay: anime.stagger(80)
				}, '-=300').add({
					targets: '.drop-zone',
					opacity: [0, 1],
					duration: 420
				}, '-=200');
			});
		});

		return {
			isDark, toggleTheme,
			hasReport, reportName, reportNotes, lastSaved,
			stocks, transactions,
			showNewReportModal, newReportName,
			showAddStockInput, newStockSymbol, newStockName,
			fileInput, toasts, dragOver, showJsonModal, exportedJson, exportedFilename, isDirty,
			addStock, removeStock, addTransaction, removeTransaction,
			createNewReport, downloadReport, triggerFileUpload, loadReport, onDrop,
			dragState, onDragStart, onDragOver, onDragLeave, onDragEnd, onStockDrop,
			collapsedStocks, toggleCollapse,
			confirmDialog, confirmResolve,
			markDirty, copyJson,
			stockSummaries, totalCost, totalRevenue, totalProfit, totalROI,
			unrealizedProfit, holdingShares, buyCount, sellCount,
			formatCurrency, formatPct, calcTotal,
			getStockTransactions, getStockSummary,
		};
	}
}).mount('#app');
</script>
</body>
</html>
